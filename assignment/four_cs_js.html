  <!-- JavaScript -->
  <script>
    function checkSkill() {
      let skill = prompt("Enter your skill (HTML, CSS, Java, Python, JavaScript):");

      if (!skill) {
        alert("No input given!");
        return;
      }

      let skills = ["html", "css", "javascript", "python", "java"];

      skill = skill.toLowerCase();

      if (skills.includes(skill)) {
        alert(skill.toUpperCase() + " is a VALID skill!");
      } else {
        alert(skill + " is NOT in the skill list.");
      }
    }
  </script>
